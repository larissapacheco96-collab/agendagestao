var MONTHS = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
var DAYS = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];

var multiMode = false;

function dk(d){ return d.toISOString().slice(0,10); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtDate(iso){ var p=iso.split("-"); return p[2]+"/"+p[1]; }

var _tt;
function toast(msg, err){
  var t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast on"+(err?" err":"");
  clearTimeout(_tt); _tt = setTimeout(function(){t.classList.remove("on");}, 3000);
}

  document.getElementById("fd").textContent = fd;

// ── LOAD (Realtime) ──
function load(){
  updHeader(); renderLoading();
  if(unsubscribe) unsubscribe();
  var dateStr = dk(cur);
  var q = query(collection(db,"eventos"), where("data","==",dateStr));
  unsubscribe = onSnapshot(q, function(snapshot){
    var data = [];
    snapshot.forEach(function(docSnap){
      var d = docSnap.data(); d.id = docSnap.id; data.push(d);
    });
    var URG_ORDER = {extrema:0, urgente:1, aguardar:2};
    data.sort(function(a,b){
      if(a.concluido!==b.concluido) return a.concluido?1:-1;
      var ua = URG_ORDER.hasOwnProperty(a.urgencia)?URG_ORDER[a.urgencia]:3;
      var ub = URG_ORDER.hasOwnProperty(b.urgencia)?URG_ORDER[b.urgencia]:3;
      if(ua!==ub) return ua-ub;
      return (a.descricao||"").localeCompare((b.descricao||""), "pt-BR", {sensitivity:"base"});
    });
    allEvs = data;
    render();
  }, function(err){
    toast("Erro ao carregar: "+err.message, true);
  });
}

function renderLoading(){
  var a = document.getElementById("cols"); a.innerHTML = "";
  activeUsers().forEach(function(u){
    var c = document.createElement("div"); c.className = "col";
    c.innerHTML = '<div class="col-hdr '+u.hcls+'"><div class="role">'+u.role+'</div><div class="pname">'+u.name+'</div><div class="ecount">Carregando...</div></div><div class="elist"><div class="spin-wrap"><span class="spinner"></span>Buscando...</div></div>';
    a.appendChild(c);
  });
}

  var a = document.getElementById("cols"); a.innerHTML = "";

      '<div class="fcheck imp"><input type="checkbox" id="im-'+u.key+'" class="imp-cb"><label for="im-'+u.key+'">⭐ Importante</label></div>'+
      '<div class="fcheck reu"><input type="checkbox" id="ru-'+u.key+'" class="reu-cb"><label for="ru-'+u.key+'">🤝 Reunião com cliente</label></div>'+
      '<div class="fcheck rei"><input type="checkbox" id="ri-'+u.key+'" class="rei-cb"><label for="ri-'+u.key+'">👥 Reunião interna</label></div>'+
      '<select id="ug-'+u.key+'" class="finp urg-select"><option value="">⚡ Urgência (marcar)...</option><option value="extrema">🔴 Extrema urgência</option><option value="urgente">🟠 Urgente</option><option value="aguardar">🟢 Pode aguardar</option></select>'+
      '<div class="facts"><button class="bsave" id="sv-'+u.key+'">Salvar</button><button class="bcancel" id="cn-'+u.key+'">Cancelar</button></div>';

    col.appendChild(hdr); col.appendChild(elist); col.appendChild(addBtn); col.appendChild(form);
    a.appendChild(col);

    // Events
    if(evs.length===0){
      elist.innerHTML = '<div class="empty"><span>📅</span>Nenhuma demanda</div>';
    } else {
      evs.forEach(function(ev){
        var item = document.createElement("div");
        item.className = "ei "+u.evcls+(ev.concluido?" done":"")+(ev.importante?" importante":"")+(ev.urgencia==="extrema"?" urg-extrema":"");

        var selChk = document.createElement("input"); selChk.type = "checkbox"; selChk.className = "sel-chk";
        selChk.setAttribute("data-id", ev.id);
        selChk.onchange = function(){
          var id = this.getAttribute("data-id");
          if(this.checked){selectedIds.add(id); this.closest(".ei").classList.add("selected");}
          else{selectedIds.delete(id); this.closest(".ei").classList.remove("selected");}
          updMsCount();
        };

        var chk = document.createElement("button"); chk.className = "chk"; chk.textContent = "✓";
        chk.setAttribute("data-id", ev.id); chk.setAttribute("data-done", ev.concluido?"1":"0");
        chk.onclick = function(){togDone(this.getAttribute("data-id"), this.getAttribute("data-done")==="1");};

        var body = document.createElement("div"); body.className = "ebody";
        var etime = document.createElement("div"); etime.className = "etime"; etime.textContent = ev.horario||"--:--";
        var etxt = document.createElement("div"); etxt.className = "etxt"; etxt.textContent = ev.descricao;
        body.appendChild(etime); body.appendChild(etxt);

        if(ev.observacao){
          var eobs = document.createElement("div"); eobs.className = "eobs"; eobs.textContent = ev.observacao;
          body.appendChild(eobs);
        }

        var tags = document.createElement("div"); tags.className = "etags";
        var UGT = {extrema:["🔴 Extrema urgência","etag-ext"],urgente:["🟠 Urgente","etag-urg"],aguardar:["🟢 Pode aguardar","etag-agu"]};
        if(ev.urgencia&&UGT[ev.urgencia]){var t0=document.createElement("span");t0.className="etag "+UGT[ev.urgencia][1];t0.textContent=UGT[ev.urgencia][0];tags.appendChild(t0);}
        if(ev.importante){var t1=document.createElement("span");t1.className="etag etag-imp";t1.textContent="⭐ Importante";tags.appendChild(t1);}
        if(ev.reuniao_cliente){var t2=document.createElement("span");t2.className="etag etag-reu";t2.textContent="🤝 C/ Cliente";tags.appendChild(t2);}
        if(ev.tipo_reuniao==="interna"){var t3=document.createElement("span");t3.className="etag etag-rei";t3.textContent="👥 Interna";tags.appendChild(t3);}
        if(ev.reagendado_auto){var t5=document.createElement("span");t5.className="etag etag-auto";t5.textContent="↪ Reagendada";tags.appendChild(t5);}
        if(tags.children.length>0) body.appendChild(tags);

        var badge = document.createElement("div"); badge.className = "dbadge"; badge.textContent = "✓ Concluído";

        // Reschedule buttons
        var rrow = document.createElement("div"); rrow.className = "resched-row";

        var acts = document.createElement("div"); acts.className = "eacts";
        var moveBtn = document.createElement("button"); moveBtn.className = "abt move-btn"; moveBtn.textContent = "➜"; moveBtn.title = "Direcionar para outra pessoa";
        moveBtn.setAttribute("data-id",ev.id);
        moveBtn.onclick = function(){openMove(this.getAttribute("data-id"));};
        var editBtn = document.createElement("button"); editBtn.className = "abt edit-btn"; editBtn.textContent = "✏️"; editBtn.title = "Editar";
        editBtn.setAttribute("data-id",ev.id);
        editBtn.onclick = function(){openEdit(this.getAttribute("data-id"));};
        var delBtn = document.createElement("button"); delBtn.className = "abt del-btn"; delBtn.textContent = "✕"; delBtn.title = "Remover";
        delBtn.setAttribute("data-id",ev.id);
        delBtn.onclick = function(){delEv(this.getAttribute("data-id"));};
        acts.appendChild(moveBtn); acts.appendChild(editBtn); acts.appendChild(delBtn);

        item.appendChild(selChk); item.appendChild(chk); item.appendChild(body); item.appendChild(acts);
        elist.appendChild(item);

    }

    (function(key){
      addBtn.onclick = function(){form.classList.toggle("on"); if(form.classList.contains("on"))document.getElementById("tx-"+key).focus();};
      document.getElementById("sv-"+key).onclick = function(){saveEv(key);};
      document.getElementById("cn-"+key).onclick = function(){form.classList.remove("on");};
      document.getElementById("tx-"+key).onkeydown = function(e){if(e.key==="Enter")saveEv(key);};
    })(u.key);
  });

  // Reunion banner
  var vkeys = activeUsers().map(function(u){return u.key;});
  var reuns = allEvs.filter(function(e){return vkeys.indexOf(e.usuario)>=0&&(e.reuniao_cliente===true||e.tipo_reuniao==="interna");});
  var banner = document.getElementById("rbanner");
  if(reuns.length>0){
    banner.classList.add("on");
    var items = reuns.map(function(r){
      var uname = (USERS.find(function(u){return u.key===r.usuario;})||{}).name||r.usuario;
      var tipo = r.reuniao_cliente?"🤝 C/ Cliente":"👥 Interna";
      return '<div class="rbanner-item"><span class="rbanner-hora">'+(r.horario||"--:--")+'</span><span>'+esc(r.descricao)+'</span><span class="rbanner-tipo">'+tipo+'</span><span class="rbanner-pessoa">'+esc(uname)+'</span></div>';
    }).join("");
    banner.innerHTML = '<div class="rbanner-title">📅 Reuniões do dia ('+reuns.length+')</div>'+items;
  } else {
    banner.classList.remove("on"); banner.innerHTML = "";
  }
}

// ── SAVE ──
async function saveEv(key){
  var tx = document.getElementById("tx-"+key).value.trim();
  if(!tx){document.getElementById("tx-"+key).focus(); return;}
  var hora = document.getElementById("t-"+key).value||null;
  var obs = document.getElementById("ob-"+key).value.trim()||null;
  var imp = document.getElementById("im-"+key).checked;
  var reu = document.getElementById("ru-"+key).checked;
  var rei = document.getElementById("ri-"+key).checked;
  var urg = document.getElementById("ug-"+key).value||null;
  var btn = document.getElementById("sv-"+key);
  btn.disabled = true; btn.textContent = "Salvando...";
  try{
    var data = {usuario:key, data:dk(cur), horario:hora, descricao:tx, concluido:false, criado_em:new Date().toISOString()};
    if(obs) data.observacao = obs;
    if(imp) data.importante = true;
    if(reu) data.reuniao_cliente = true;
    if(rei) data.tipo_reuniao = "interna";
    if(urg) data.urgencia = urg;
    await addDoc(collection(db,"eventos"), data);
    toast("✓ Demanda adicionada!");
    document.getElementById("tx-"+key).value = "";
    document.getElementById("t-"+key).value = "";
    document.getElementById("ob-"+key).value = "";
    document.getElementById("im-"+key).checked = false;
    document.getElementById("ru-"+key).checked = false;
    document.getElementById("ri-"+key).checked = false;
    document.getElementById("ug-"+key).value = "";
    document.getElementById("af-"+key).classList.remove("on");
  } catch(e){ toast("Erro: "+e.message, true); }
  btn.disabled = false; btn.textContent = "Salvar";
}

// ── TOGGLE DONE ──
async function togDone(id, isDone){
  try{
    await updateDoc(doc(db,"eventos",id), {concluido:!isDone});
    toast(isDone?"↩️ Reaberta.":"✅ Concluída!");
  } catch(e){ toast("Erro: "+e.message, true); }
}

// ── RESCHEDULE ──
async function reschedule(id, days){
  var ev = allEvs.find(function(e){return e.id===id;});
  if(!ev){toast("Demanda não encontrada.",true);return;}
  var nd = new Date(cur.getTime()+days*86400000);
  var ndStr = nd.toISOString().slice(0,10);
  var ndl = fmtDate(ndStr);
  if(!confirm('Reagendar "'+ev.descricao+'" para +'+days+'d ('+ndl+')?')) return;
  try{
    var nev = {usuario:ev.usuario, data:ndStr, horario:ev.horario||null, descricao:ev.descricao, concluido:false, criado_em:new Date().toISOString()};
    if(ev.observacao) nev.observacao = ev.observacao;
    if(ev.importante) nev.importante = true;
    if(ev.reuniao_cliente) nev.reuniao_cliente = true;
    if(ev.tipo_reuniao) nev.tipo_reuniao = ev.tipo_reuniao;
    if(ev.urgencia) nev.urgencia = ev.urgencia;
    await addDoc(collection(db,"eventos"), nev);
    await deleteDoc(doc(db,"eventos",id));
    toast("📅 Reagendado para "+ndl+"!");
  } catch(e){ toast("Erro: "+e.message, true); }
}

// ── RESCHEDULE MULTIPLE ──
async function reagendarSelecionadas(days){
  if(selectedIds.size===0){toast("Selecione ao menos uma demanda.", true); return;}
  var nd = new Date(cur.getTime()+days*86400000);
  var ndl = fmtDate(nd.toISOString().slice(0,10));
  if(!confirm("Reagendar "+selectedIds.size+" demanda"+(selectedIds.size!==1?"s":"")+" para +"+days+"d ("+ndl+")?")) return;
  var ids = Array.from(selectedIds);
  var evs = allEvs.filter(function(e){return ids.indexOf(e.id)>=0;});
  var ok = 0;
  for(var i=0;i<evs.length;i++){
    var ev = evs[i];
    try{
      var nev = {usuario:ev.usuario, data:nd.toISOString().slice(0,10), horario:ev.horario||null, descricao:ev.descricao, concluido:false, criado_em:new Date().toISOString()};
      if(ev.observacao) nev.observacao = ev.observacao;
      if(ev.importante) nev.importante = true;
      if(ev.reuniao_cliente) nev.reuniao_cliente = true;
      if(ev.tipo_reuniao) nev.tipo_reuniao = ev.tipo_reuniao;
      if(ev.urgencia) nev.urgencia = ev.urgencia;
      await addDoc(collection(db,"eventos"), nev);
      await deleteDoc(doc(db,"eventos",ev.id));
      ok++;
    } catch(e){}
  }
  toast("📅 "+ok+" demanda"+(ok!==1?"s":"")+" reagendada"+(ok!==1?"s":"")+" para "+ndl+"!");
  cancelMultiSelect();
}

// ── DELETE ──
async function delEv(id){
  if(!confirm("Remover esta demanda?")) return;
  try{
    await deleteDoc(doc(db,"eventos",id));
    toast("Demanda removida.");
  } catch(e){ toast("Erro: "+e.message, true); }
}

// ── EDIT ──
function openEdit(id){
  var ev = allEvs.find(function(e){return e.id===id;});
  if(!ev) return;
  document.getElementById("editId").value = ev.id;
  document.getElementById("editHora").value = ev.horario||"";
  document.getElementById("editDesc").value = ev.descricao||"";
  document.getElementById("editObs").value = ev.observacao||"";
  document.getElementById("editImp").checked = ev.importante===true;
  document.getElementById("editReu").checked = ev.reuniao_cliente===true;
  document.getElementById("editRei").checked = ev.tipo_reuniao==="interna";
  document.getElementById("editUrg").value = ev.urgencia||"";
  document.getElementById("editModal").style.display = "flex";
}

window.saveEdit = async function(){
  var id = document.getElementById("editId").value;
  var hora = document.getElementById("editHora").value||null;
  var desc = document.getElementById("editDesc").value.trim();
  var obs = document.getElementById("editObs").value.trim()||null;
  var imp = document.getElementById("editImp").checked;
  var reu = document.getElementById("editReu").checked;
  var rei = document.getElementById("editRei").checked;
  var urg = document.getElementById("editUrg").value||null;
  if(!desc){toast("Descrição obrigatória.",true);return;}
  try{
    await updateDoc(doc(db,"eventos",id), {horario:hora, descricao:desc, observacao:obs||null, importante:imp, reuniao_cliente:reu, tipo_reuniao:rei?"interna":null, urgencia:urg});
    toast("✏️ Demanda atualizada!");
    document.getElementById("editModal").style.display = "none";
  } catch(e){ toast("Erro: "+e.message, true); }
};

document.getElementById("editModal").onclick = function(e){if(e.target===this)this.style.display="none";};

// ── DIRECIONAR DEMANDA ──
var moveId = null;
function openMove(id){
  var ev = allEvs.find(function(e){return e.id===id;});
  if(!ev) return;
  moveId = id;
  var opts = USERS_ALL.filter(function(u){
    if(u.key===ev.usuario) return false;
    if(u.key==="leilane") return leilane_active;
    if(u.key==="senior_rtc") return senior_active;
    return true;
  });
  var box = document.getElementById("moveOpts");
  box.innerHTML = "";
  opts.forEach(function(u){
    var b = document.createElement("button");
    b.className = "move-opt";

var vgFilter = "all";
var vgPerson = "all";
var vgData = [];

function initVisao(){
  var now = new Date();
  var de = document.getElementById("vgDe");
  var ate = document.getElementById("vgAte");
  if(!de.value){
    var first = new Date(now.getFullYear(),now.getMonth(),1);
    de.value = first.toISOString().slice(0,10);
  }
  if(!ate.value) ate.value = dk(now);
  loadVisao();
}

window.loadVisao = async function(){
  var de = document.getElementById("vgDe").value;
  var ate = document.getElementById("vgAte").value;
  if(!de||!ate){toast("Selecione o período.",true);return;}
  document.getElementById("vgList").innerHTML = '<div class="spin-wrap"><span class="spinner"></span>Carregando...</div>';
  try{
    var q = query(collection(db,"eventos"), where("data",">=",de), where("data","<=",ate));
    var snap = await getDocs(q);
    vgData = [];
    snap.forEach(function(d){var item=d.data();item.id=d.id;vgData.push(item);});
    vgData.sort(function(a,b){return b.data.localeCompare(a.data)||((a.horario||"").localeCompare(b.horario||""));});
    document.getElementById("vgTotal").textContent = vgData.length;
    document.getElementById("vgDone").textContent = vgData.filter(function(e){return e.concluido;}).length;
    document.getElementById("vgPend").textContent = vgData.filter(function(e){return !e.concluido;}).length;
    document.getElementById("vgImp").textContent = vgData.filter(function(e){return e.importante;}).length;
    renderVisao();
  } catch(e){ toast("Erro: "+e.message, true); }
};

function renderVisao(){
  var filtered = vgData;
  if(vgFilter==="pend") filtered = vgData.filter(function(e){return !e.concluido;});
  else if(vgFilter==="done") filtered = vgData.filter(function(e){return e.concluido;});
  else if(vgFilter==="imp") filtered = vgData.filter(function(e){return e.importante;});
  if(vgPerson!=="all") filtered = filtered.filter(function(e){return e.usuario===vgPerson;});
  var list = document.getElementById("vgList");
  if(filtered.length===0){list.innerHTML='<div class="vg-empty"><span>📭</span>Nenhuma demanda encontrada.</div>';return;}
  list.innerHTML = "";
  filtered.forEach(function(ev){
    var uname = (USERS_ALL.find(function(u){return u.key===ev.usuario;})||{}).name||ev.usuario;
    var item = document.createElement("div");
    item.className = "vg-item"+(ev.concluido?" done":"")+(ev.importante?" importante":"")+((!ev.concluido)?" pend":"");
    var left = document.createElement("div"); left.className = "vg-item-left";
    left.innerHTML = '<div class="vg-item-name">'+esc(uname)+'</div><div class="vg-item-desc">'+esc(ev.descricao)+'</div>';
    if(ev.observacao){var obs=document.createElement("div");obs.className="vg-item-obs";obs.textContent=ev.observacao;left.appendChild(obs);}
    var tags = document.createElement("div"); tags.className = "vg-item-tags";
    var UGT2 = {extrema:["🔴","etag-ext"],urgente:["🟠","etag-urg"],aguardar:["🟢","etag-agu"]};
    if(ev.urgencia&&UGT2[ev.urgencia]){var t0=document.createElement("span");t0.className="etag "+UGT2[ev.urgencia][1];t0.textContent=UGT2[ev.urgencia][0];tags.appendChild(t0);}
    if(ev.importante){var t1=document.createElement("span");t1.className="etag etag-imp";t1.textContent="⭐";tags.appendChild(t1);}
    if(ev.reuniao_cliente){var t2=document.createElement("span");t2.className="etag etag-reu";t2.textContent="🤝";tags.appendChild(t2);}
    if(ev.tipo_reuniao==="interna"){var t3=document.createElement("span");t3.className="etag etag-rei";t3.textContent="👥";tags.appendChild(t3);}
    if(ev.concluido){var t4=document.createElement("span");t4.className="etag";t4.style.cssText="background:#e8fff0;color:#1a7a4a;";t4.textContent="✅";tags.appendChild(t4);}
    if(tags.children.length>0) left.appendChild(tags);
    var right = document.createElement("div"); right.className = "vg-item-right";
    right.innerHTML = '<div class="vg-item-date">'+fmtDate(ev.data)+'</div><div class="vg-item-hora">'+(ev.horario||"--:--")+'</div>';
    item.appendChild(left); item.appendChild(right);
    list.appendChild(item);
  });
}

// ── STANDBY (Firebase) ──
var unsubStandby = null;

function loadStandby(){
  if(unsubStandby) unsubStandby();
  var q = query(collection(db,"standby"), where("resolvido","==",false));
  unsubStandby = onSnapshot(q, function(snap){
    var items = [];
    snap.forEach(function(d){var item=d.data();item.id=d.id;items.push(item);});
    items.sort(function(a,b){
      var order = {alta:0,media:1,baixa:2};
      var pa = order[a.prioridade]||1; var pb = order[b.prioridade]||1;
      if(pa!==pb) return pa-pb;
      return (a.prazo||"9999").localeCompare(b.prazo||"9999");
    });
    renderStandby(items);
  });
}

function renderStandby(items){
  var list = document.getElementById("standbyList");
  var today_s = dk(new Date());
  if(items.length===0){list.innerHTML='<div class="standby-empty"><span>✨</span>Nenhuma demanda em stand-by.</div>';return;}
  list.innerHTML = "";
  items.forEach(function(item){
    var isVencido = item.prazo && item.prazo < today_s;
    var uname = (USERS_ALL.find(function(u){return u.key===item.usuario;})||{}).name||item.usuario;
    var div = document.createElement("div");
    div.className = "standby-item "+(item.prioridade||"media")+(isVencido?" vencido":"");
    var top = document.createElement("div"); top.className = "standby-item-top";
    var body = document.createElement("div"); body.className = "standby-item-body";
    body.innerHTML = '<div class="standby-item-desc">'+esc(item.descricao)+'</div>';
    if(item.observacao) body.innerHTML += '<div class="standby-item-obs">'+esc(item.observacao)+'</div>';
    var footer = document.createElement("div"); footer.className = "standby-item-footer";
    var prazoTxt = item.prazo?(fmtDate(item.prazo)+(isVencido?" ⚠️":"")) : "-";
    footer.innerHTML = '<span class="standby-prio '+(item.prioridade||"media")+'">'+(item.prioridade==="alta"?"🔴 Alta":item.prioridade==="baixa"?"🟢 Baixa":"🟡 Média")+'</span>'
      +'<span class="standby-prazo'+(isVencido?" vencido":"")+'">📅 '+prazoTxt+'</span>'
      +'<span class="standby-user">'+esc(uname)+'</span>';
    body.appendChild(footer);
    var acts = document.createElement("div"); acts.className = "standby-acts";
    var okBtn = document.createElement("button"); okBtn.className = "standby-btn ok"; okBtn.textContent = "✓"; okBtn.title = "Resolver";
    okBtn.setAttribute("data-id", item.id);
    okBtn.onclick = async function(){
      try{ await updateDoc(doc(db,"standby",this.getAttribute("data-id")),{resolvido:true}); toast("✅ Stand-by resolvido!"); } catch(e){ toast("Erro.",true); }
    };
    var delBtn = document.createElement("button"); delBtn.className = "standby-btn del"; delBtn.textContent = "✕";
    delBtn.setAttribute("data-id", item.id);
    delBtn.onclick = async function(){
      if(!confirm("Remover do radar?")) return;
      try{ await deleteDoc(doc(db,"standby",this.getAttribute("data-id"))); toast("Removido."); } catch(e){ toast("Erro.",true); }
    };
    acts.appendChild(okBtn); acts.appendChild(delBtn);
    top.appendChild(body); top.appendChild(acts);
    div.appendChild(top);
    list.appendChild(div);
  });
}

// ── REAGENDAMENTO AUTOMÁTICO (não concluídas → dia seguinte após as 20h) ──
var ROLL_HOUR = 20;          // horário de corte (20h)
var ROLL_LOOKBACK = 90;      // quantos dias pra trás varrer (limita leituras)
var rolling = false;

async function autoRollover(){
  if(rolling) return;
  rolling = true;
  try{
    var now = new Date();
    var t = new Date(); t.setHours(0,0,0,0);
    var cutoffPassed = now.getHours() >= ROLL_HOUR;
    // Antes das 20h: joga atrasadas pra hoje. Depois das 20h: joga atrasadas + as de hoje pra amanhã.
    var target = cutoffPassed ? new Date(t.getTime()+86400000) : t;
    var targetStr = dk(target);
    var floorStr = dk(new Date(t.getTime() - ROLL_LOOKBACK*86400000));
    var q = query(collection(db,"eventos"), where("data",">=",floorStr), where("data","<",targetStr));
    var snap = await getDocs(q);
    var ops = []; var moved = 0;
    snap.forEach(function(d){
      var ev = d.data();
      if(!ev.concluido){
        ops.push(updateDoc(doc(db,"eventos",d.id), {data:targetStr, reagendado_auto:true}));
        moved++;
      }
    });
    if(ops.length){
      await Promise.all(ops);
      toast("⏰ "+moved+" demanda"+(moved!==1?"s":"")+" não concluída"+(moved!==1?"s":"")+" → "+fmtDate(targetStr));
    }
  } catch(e){ /* silencioso: não atrapalha o uso da agenda */ }
  rolling = false;
}

function scheduleRollover(){
  var now = new Date();
  var next = new Date(now.getFullYear(), now.getMonth(), now.getDate(), ROLL_HOUR, 0, 5, 0);
  if(now.getTime() >= next.getTime()) next = new Date(next.getTime()+86400000);
  setTimeout(function(){
    autoRollover().then(function(){ load(); scheduleRollover(); });
  }, next.getTime() - now.getTime());
}

.abt.move-btn{border-color:#c9b8a0;color:#8a6d4a;}
.abt.move-btn:hover{background:#f5efe6;border-color:#a0784f;color:#6b4423;}
.move-opt{padding:10px 12px;border:1.5px solid var(--bo);border-radius:10px;background:var(--bg);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;text-align:left;}
.move-opt:hover{background:var(--tl);border-color:var(--teal);color:var(--td);}
.empty{text-align:center;padding:20px 12px;color:var(--mu);font-size:12px;}
.empty span{font-size:22px;display:block;margin-bottom:5px;}
.spin-wrap{text-align:center;padding:18px;color:var(--mu);font-size:13px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--bo);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.add-btn{width:calc(100% - 24px);margin:0 12px 10px;padding:9px;background:var(--tl);border:1.5px dashed var(--teal);border-radius:10px;color:var(--td);font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;}
.add-btn:hover{background:var(--teal);color:white;border-style:solid;}
.aform{display:none;padding:10px 12px 12px;border-top:1.5px solid var(--tl);background:#fafffe;}
.aform.on{display:block;}
.frow{display:flex;gap:7px;margin-bottom:7px;}
.finp{width:100%;padding:7px 10px;border-radius:8px;border:1.5px solid var(--bo);font-family:"DM Sans",sans-serif;font-size:12px;color:var(--text);background:white;outline:none;margin-bottom:7px;}
.finp:focus{border-color:var(--teal);}
.finp-obs{min-height:50px;resize:vertical;}
.fcheck{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:8px;margin-bottom:6px;cursor:pointer;}
.fcheck.imp{background:#fff8e8;border:1.5px solid #f0c060;}
.fcheck.reu{background:#f1f5f9;border:1.5px solid #cbd5e1;}
.fcheck.rei{background:#eef3f1;border:1.5px solid #c3d4cf;}
.fcheck input{width:14px;height:14px;cursor:pointer;}
.fcheck input.imp-cb{accent-color:var(--gold);}
.fcheck input.reu-cb{accent-color:#64748b;}
.fcheck input.rei-cb{accent-color:#6b7f7a;}
.fcheck label{font-size:12px;font-weight:600;cursor:pointer;}
.fcheck.imp label{color:#8a6000;}
.fcheck.reu label{color:#475569;}
.fcheck.rei label{color:#5a6b68;}
.facts{display:flex;gap:7px;}
.bsave{flex:1;padding:8px;background:var(--teal);color:white;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.bsave:hover{background:var(--td);}
.bsave:disabled{opacity:.6;cursor:not-allowed;}
.bcancel{padding:8px 12px;background:none;color:var(--mu);border:1.5px solid var(--bo);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:12px;cursor:pointer;}
.standby-panel{background:var(--wh);border-radius:16px;box-shadow:var(--sh);border:1.5px solid var(--bo);overflow:hidden;position:sticky;top:20px;}
.standby-hdr{background:linear-gradient(135deg,#2a4a7a,#3a6ab0);padding:13px 16px;}
.standby-hdr-title{font-family:"Playfair Display",serif;font-size:16px;font-weight:700;color:white;}
.standby-hdr-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px;}
.standby-body{padding:10px 12px;max-height:65vh;overflow-y:auto;}
.standby-item{background:var(--bg);border-radius:10px;padding:9px 11px;margin-bottom:7px;border-left:3px solid #3a6ab0;}
.standby-item.alta{border-left-color:#c0392b;}
.standby-item.media{border-left-color:var(--gold);}
.standby-item.baixa{border-left-color:var(--green);}
.standby-item.vencido{background:#fff8f0;}
.standby-item-top{display:flex;align-items:flex-start;gap:7px;}
.standby-item-body{flex:1;min-width:0;}
.standby-item-desc{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;}
.standby-item-obs{font-size:11px;color:var(--mu);margin-top:2px;font-style:italic;}
.standby-item-footer{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap;}
.standby-prio{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;}
.standby-prio.alta{background:#fde8e8;color:#c0392b;}
.standby-prio.media{background:#fff3cc;color:#8a6000;}
.standby-prio.baixa{background:#e8fff0;color:#1a7a4a;}
.standby-prazo{font-size:10px;font-weight:600;color:var(--mu);}
.standby-prazo.vencido{color:#c0392b;font-weight:700;}
.standby-user{font-size:10px;color:var(--mu);margin-left:auto;}
.standby-acts{display:flex;gap:3px;flex-shrink:0;flex-direction:column;}
.standby-btn{background:none;border:1.5px solid var(--bo);cursor:pointer;font-size:11px;padding:2px 5px;border-radius:6px;color:var(--mu);transition:all .15s;}
.standby-btn.ok{border-color:#a0d0b0;color:var(--green);}
.standby-btn.ok:hover{background:#e8fff0;}
.standby-btn.del{border-color:#f0c0c0;color:#c0392b;}
.standby-btn.del:hover{background:#fdecea;}
.standby-add-btn{width:calc(100% - 24px);margin:0 12px 10px;padding:8px;background:rgba(58,106,176,.1);border:1.5px dashed #3a6ab0;border-radius:10px;color:#2a4a7a;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;}
.standby-add-btn:hover{background:#3a6ab0;color:white;border-style:solid;}
.standby-form{display:none;padding:10px 12px;border-top:1.5px solid var(--bo);background:#f8faff;}
.standby-form.on{display:block;}
.sb-finp{width:100%;padding:6px 9px;border-radius:8px;border:1.5px solid var(--bo);font-family:"DM Sans",sans-serif;font-size:12px;color:var(--text);background:white;outline:none;margin-bottom:6px;}
.sb-finp:focus{border-color:#3a6ab0;}
.sb-finp-obs{min-height:45px;resize:vertical;}
.sb-frow{display:flex;gap:6px;margin-bottom:6px;}
.sb-frow .sb-finp{margin-bottom:0;}
.sb-select{width:100%;padding:6px 9px;border-radius:8px;border:1.5px solid var(--bo);font-family:"DM Sans",sans-serif;font-size:12px;color:var(--text);background:white;outline:none;margin-bottom:6px;}
.sb-facts{display:flex;gap:6px;}
.sb-bsave{flex:1;padding:7px;background:#3a6ab0;color:white;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.sb-bcancel{padding:7px 11px;background:none;color:var(--mu);border:1.5px solid var(--bo);border-radius:8px;font-family:"DM Sans",sans-serif;font-size:12px;cursor:pointer;}
.standby-empty{text-align:center;padding:18px;color:var(--mu);font-size:12px;}
.standby-empty span{font-size:20px;display:block;margin-bottom:5px;}
.vg-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.vg-filter-btn,.vg-person-btn{padding:5px 13px;border-radius:20px;border:1.5px solid var(--bo);background:white;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;}
.vg-filter-btn:hover,.vg-person-btn:hover{border-color:var(--td);color:var(--td);}
.vg-filter-btn.on,.vg-person-btn.on{background:var(--td);color:white;border-color:var(--td);}
.vg-filter-btn.pend{border-color:var(--orange);color:var(--orange);}
.vg-filter-btn.pend.on{background:var(--orange);color:white;}
.vg-filter-btn.done{border-color:var(--green);color:var(--green);}
.vg-filter-btn.done.on{background:var(--green);color:white;}
.vg-sep{width:1px;height:26px;background:var(--bo);margin:0 3px;align-self:center;}
.vg-period{display:flex;align-items:center;gap:7px;margin-left:auto;flex-wrap:wrap;}
.vg-period label{font-size:12px;color:var(--mu);font-weight:600;}
.vg-period input{padding:5px 9px;border-radius:8px;border:1.5px solid var(--bo);font-size:12px;color:var(--text);outline:none;}
.vg-period input:focus{border-color:var(--teal);}
.vg-period button{padding:6px 13px;background:var(--teal);color:white;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.vg-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px;}
.vg-stat{background:var(--wh);border-radius:12px;padding:13px 15px;border:1.5px solid var(--bo);box-shadow:var(--sh);}
.vg-stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);margin-bottom:3px;}
.vg-stat-val{font-family:"Playfair Display",serif;font-size:24px;font-weight:700;color:var(--td);line-height:1;}
.vg-stat-sub{font-size:11px;color:var(--mu);margin-top:2px;}
.vg-stat.good .vg-stat-val{color:var(--green);}
.vg-stat.pend .vg-stat-val{color:var(--orange);}
.vg-stat.imp .vg-stat-val{color:var(--gold);}
.vg-list{display:flex;flex-direction:column;gap:7px;}
.vg-item{background:var(--wh);border-radius:11px;padding:11px 14px;border:1.5px solid var(--bo);border-left:4px solid var(--teal);display:flex;align-items:flex-start;gap:11px;box-shadow:var(--sh);}
.vg-item.done{opacity:.65;border-left-color:var(--green);}
.vg-item.importante{border-left-color:var(--gold);background:#fffbf0;}
.vg-item.pend{border-left-color:var(--orange);}
.vg-item-left{flex:1;min-width:0;}
.vg-item-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-bottom:2px;}
.vg-item-desc{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;}
.vg-item-obs{font-size:11px;color:var(--mu);margin-top:2px;font-style:italic;}
.vg-item-right{text-align:right;flex-shrink:0;}
.vg-item-date{font-size:12px;font-weight:600;color:var(--td);}
.vg-item-hora{font-size:11px;color:var(--mu);}
.vg-item-tags{display:flex;gap:3px;margin-top:3px;justify-content:flex-end;}
.vg-empty{text-align:center;padding:36px;color:var(--mu);font-size:14px;}
.vg-empty span{font-size:28px;display:block;margin-bottom:7px;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1c2b2a;color:white;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;white-space:nowrap;}
.toast.on{opacity:1;}
.toast.err{background:#c0392b;}
.footer{text-align:center;margin-top:24px;color:var(--mu);font-size:12px;}
@media(max-width:900px){.agenda-wrap{grid-template-columns:1fr;}.cols{grid-template-columns:1fr;}.standby-panel{position:static;}.hdr{flex-direction:column;gap:8px;}.main{padding:14px 12px 32px;}.cur{min-width:0;font-size:16px;}.vg-summary{grid-template-columns:repeat(2,1fr);}.vg-period{margin-left:0;width:100%;}}
</style>
